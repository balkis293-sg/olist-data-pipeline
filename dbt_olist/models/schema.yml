version: 2

models:
  # ─────────────────────────────────────────────
  # STAGING LAYER
  # ─────────────────────────────────────────────
  - name: stg_customers
    description: Cleaned customer data from the Olist raw dataset.
    columns:
      - name: customer_id
        tests:
          - not_null
      - name: customer_unique_id
        tests:
          - not_null

  - name: stg_orders
    description: Cleaned order data with standardized timestamps and order status.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: string
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: ['delivered', 'shipped', 'canceled', 'unavailable', 'invoiced', 'processing', 'created', 'approved']
      - name: order_purchase_timestamp
        tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: timestamp

  - name: stg_order_items
    description: Cleaned order item data with item price and freight value.
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null
      - name: price
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: true
      - name: freight_value
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: false

  - name: stg_payments
    description: Cleaned payment data used to calculate order revenue.
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_value
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100000
              strictly: false
      - name: payment_type
        tests:
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']
      - name: payment_installments
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 24

  - name: stg_products
    description: Cleaned product data.
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: product_weight_g
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: true
              config:
                severity: warn

  - name: stg_sellers
    description: Cleaned seller data.
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: stg_reviews
    description: Cleaned order review data.
    columns:
      - name: review_id
        tests:
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: review_score
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 5

  # ─────────────────────────────────────────────
  # DIMENSION TABLES
  # ─────────────────────────────────────────────
  - name: dim_customers
    description: Customer dimension table for the star schema.
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 90000
          max_value: 110000
    columns:
      - name: customer_key
        tests:
          - not_null
          - unique
      - name: customer_state
        tests:
          - dbt_expectations.expect_column_value_lengths_to_equal:
              value: 2

  - name: dim_products
    description: Product dimension table for the star schema.
    columns:
      - name: product_key
        tests:
          - not_null
          - unique

  - name: dim_sellers
    description: Seller dimension table for the star schema.
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 3000
          max_value: 4000
    columns:
      - name: seller_key
        tests:
          - not_null
          - unique
      - name: seller_state
        tests:
          - dbt_expectations.expect_column_value_lengths_to_equal:
              value: 2

  - name: dim_date
    description: Date dimension table for time-based analysis.
    tests:
      - dbt_expectations.expect_table_row_count_to_equal:
          value: 1096
    columns:
      - name: date_key
        tests:
          - not_null
          - unique
          - dbt_expectations.expect_column_value_lengths_to_equal:
              value: 8
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[0-9]{8}$"
      # - name: year
      #   tests:
      #     - dbt_expectations.expect_column_values_to_be_in_set:
      #         value_set: [2016, 2017, 2018]
      - name: month
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 12
      - name: quarter
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 4
      - name: day_of_week
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 7

  # ─────────────────────────────────────────────
  # FACT TABLE
  # ─────────────────────────────────────────────
  - name: fact_orders
    description: Order-item level fact table connected to customer, product, seller, and date dimensions.
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 100000
          max_value: 130000
    columns:
      - name: order_item_sk
        tests:
          - not_null
          - unique
      - name: order_key
        tests:
          - not_null
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_key
      - name: product_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_key
      - name: seller_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_sellers')
              field: seller_key
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[0-9]{8}$"
      - name: price
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: true
          - dbt_expectations.expect_column_mean_to_be_between:
              min_value: 50
              max_value: 200
      - name: freight_value
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: false
      - name: total_sale_amount
        description: Total value of the order item including freight.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: true
      - name: freight_percentage
        description: Percentage of the total sale amount attributed to freight.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1
